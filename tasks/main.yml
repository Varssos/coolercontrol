---
# Based on: https://docs.coolercontrol.org/installation/debian.html

- name: Check if CoolerControl is already installed
  ansible.builtin.command: dpkg-query -W {{ coolercontrol_package_name }}
  register: coolercontrol_installed
  failed_when: false
  changed_when: false

- name: Ensure curl is installed (required for repository setup script)
  ansible.builtin.apt:
    name: curl
    state: present
  become: true
  when: coolercontrol_installed.rc != 0

- name: Download CoolerControl repository setup script
  ansible.builtin.get_url:
    url: "{{ coolercontrol_setup_script_url }}"
    dest: /tmp/coolercontrol_setup.sh
    mode: "0700"
    timeout: 30
  become: true
  when: coolercontrol_installed.rc != 0

- name: Add CoolerControl repository via setup script
  ansible.builtin.shell: /tmp/coolercontrol_setup.sh
  become: true
  changed_when: true
  async: 120
  poll: 10
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: coolercontrol_installed.rc != 0

- name: Remove CoolerControl setup script
  ansible.builtin.file:
    path: /tmp/coolercontrol_setup.sh
    state: absent
  become: true
  when: coolercontrol_installed.rc != 0

- name: Install CoolerControl
  ansible.builtin.apt:
    name: "{{ coolercontrol_package_name }}"
    state: present
    update_cache: true
  become: true
  when: coolercontrol_installed.rc != 0

- name: Enable and start CoolerControl daemon
  ansible.builtin.systemd:
    name: "{{ coolercontrol_service_name }}"
    enabled: true
    state: started
  become: true
